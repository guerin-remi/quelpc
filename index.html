<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quel PC — Trouvez l'ordinateur qui vous correspond</title>
<meta name="description" content="Répondez à 6 questions simples, sans jargon, et découvrez quel type d'ordinateur vous correspond vraiment. Conseil neutre : nous ne vendons rien.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF6EE;
    --card: #FFFFFF;
    --ink: #23281E;
    --ink-soft: #6D7268;
    --green: #1B8A5A;
    --green-dark: #0E5E3E;
    --green-soft: #E4F3E9;
    --coral: #E45C35;
    --coral-soft: #FCE9E1;
    --blue: #3670C9;
    --blue-soft: #E6EEFA;
    --violet: #7451D6;
    --violet-soft: #EEE9FB;
    --amber: #D98A1F;
    --amber-soft: #FBF0DA;
    --amber-ink: #6E5619;
    --line: #E8E1D4;
    --radius: 16px;
    --font-title: "Bricolage Grotesque", "Segoe UI", system-ui, sans-serif;
    --font-body: "Inter", "Segoe UI", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font-body);
    background:
      radial-gradient(circle at 8% 4%, rgba(249, 222, 139, .42) 0 70px, transparent 71px),
      radial-gradient(circle at 96% 24%, rgba(27, 138, 90, .12) 0 92px, transparent 93px),
      var(--bg);
    color: var(--ink);
    line-height: 1.55;
    min-height: 100dvh;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  }
  h1, h2, h3 { font-family: var(--font-title); line-height: 1.12; letter-spacing: -0.01em; }

  /* Set d'icônes maison "duotone contour" : trait épais arrondi
     + remplissage translucide de la même couleur. */
  svg.ic {
    width: 22px; height: 22px; flex-shrink: 0; display: block;
    stroke: currentColor; stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  svg.ic .d { fill: currentColor; fill-opacity: .16; }
  svg.ic .f { fill: currentColor; fill-opacity: 1; stroke: none; }

  /* Teintes par option */
  .t-green  { background: var(--green-soft);  color: var(--green); }
  .t-coral  { background: var(--coral-soft);  color: var(--coral); }
  .t-blue   { background: var(--blue-soft);   color: var(--blue); }
  .t-violet { background: var(--violet-soft); color: var(--violet); }
  .t-amber  { background: var(--amber-soft);  color: var(--amber); }

  /* ---------- Barre de progression ---------- */
  .topbar { display: flex; align-items: center; gap: 10px; min-height: 30px; margin-bottom: 6px; flex-shrink: 0; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    color: var(--ink-soft); padding: 8px 10px 8px 0; display: flex; align-items: center; gap: 2px;
  }
  .back-btn:hover { color: var(--ink); }
  .back-btn svg.ic { width: 16px; height: 16px; }
  .progress-segs { flex: 1; display: flex; gap: 5px; }
  .seg { flex: 1; height: 7px; border-radius: 99px; background: var(--line); transition: background .3s; }
  .seg.done { background: var(--green); }
  .seg.now { background: var(--green); opacity: .45; }
  .step-count { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* ---------- Écrans ---------- */
  .screen { flex: 1; display: flex; flex-direction: column; animation: slideIn .3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .screen, .rise, .opt-check, .float, .mascot-pop { animation: none !important; }
  }

  .question-page {
    position: fixed; inset: 0; max-width: 480px; margin: 0 auto;
    padding: calc(12px + env(safe-area-inset-top)) 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; overflow: hidden;
    background: radial-gradient(circle at 100% 0, var(--green-soft) 0 88px, transparent 89px), var(--bg);
  }
  .question-content { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: safe center; }
  .question-page .mascot-row { margin: clamp(7px, 1.6vh, 14px) 0 clamp(10px, 2vh, 18px); flex-shrink: 0; }
  .question-page .bubble {
    border-color: var(--green-border); background: var(--green-soft); color: var(--green-dark);
    padding: 8px 12px; font-size: 12.5px; box-shadow: 0 2px 0 var(--green-border);
  }
  .question-page .bubble::before { background: var(--green-soft); border-color: var(--green-border); }
  .q-title { font-size: 23px; font-weight: 800; margin-bottom: 8px; flex-shrink: 0; }
  .q-title::after { content: ""; display: block; width: 28px; height: 5px; border-radius: 9px; background: var(--green); margin-top: 7px; }
  .q-help { font-size: 13px; line-height: 1.35; color: var(--ink-soft); margin-bottom: clamp(10px, 2vh, 18px); flex-shrink: 0; }

  .options { flex: 0 1 auto; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 1px 1px 4px; scrollbar-width: thin; }
  .option {
    display: flex; align-items: center; gap: 10px; text-align: left; flex-shrink: 0;
    background: var(--card); border: 2px solid var(--green-border); border-radius: 13px;
    padding: 11px 12px; cursor: pointer; width: 100%;
    font-family: var(--font-body); font-size: 16px; color: var(--ink);
    transition: border-color .15s, background .15s, transform .1s;
  }
  .option:active { transform: scale(.99); }
  .option.selected { border-color: var(--green); background: var(--green-soft); }
  .opt-icon {
    width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--green-soft); color: var(--green);
    transition: transform .2s cubic-bezier(.2, 1.4, .5, 1);
  }
  .opt-icon svg.ic { width: 21px; height: 21px; }
  .option.selected .opt-icon { transform: rotate(-6deg) scale(1.08); }
  .opt-text { flex: 1; min-width: 0; }
  .opt-label { font-weight: 700; display: block; font-size: 15px; line-height: 1.25; }
  .opt-sub { font-size: 12px; line-height: 1.25; color: var(--ink-soft); display: block; margin-top: 2px; }
  .opt-check {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(.4);
  }
  .opt-check svg.ic { width: 13px; height: 13px; }
  .option.selected .opt-check { opacity: 1; animation: checkPop .3s cubic-bezier(.2, 1.6, .5, 1) forwards; }
  @keyframes checkPop { from { transform: scale(.4); } to { transform: scale(1); } }

  .question-actions {
    flex-shrink: 0; display: grid; grid-template-columns: auto 1fr; gap: 9px;
    padding-top: 12px; background: var(--bg);
  }
  .question-actions .back-btn {
    border: 2px solid var(--line); border-radius: 13px; padding: 10px 12px; background: var(--card); color: var(--ink);
  }
  .question-actions .btn { margin: 0; padding: 11px 16px; border-radius: 13px; font-size: 16px; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%;
    background: var(--green); color: #fff; border: none; cursor: pointer;
    font-family: var(--font-title); font-size: 17px; font-weight: 800;
    padding: 15px 20px; border-radius: var(--radius); margin-top: 22px;
    box-shadow: 0 4px 0 var(--green-dark);
    transition: transform .1s, box-shadow .1s, background .15s;
  }
  .btn:hover { background: #1F9963; }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--green-dark); }
  .btn:disabled { background: var(--line); color: var(--ink-soft); box-shadow: 0 4px 0 #D9D1C1; cursor: not-allowed; }
  .btn.secondary {
    background: var(--card); color: var(--green-dark);
    border: 2px solid var(--green); box-shadow: 0 3px 0 var(--green);
    margin-top: 10px; font-weight: 700;
  }
  .btn.secondary:hover { background: var(--green-soft); }
  .btn.secondary:active { transform: translateY(3px); box-shadow: 0 0 0 var(--green); }
  .btn svg.ic { width: 19px; height: 19px; }

  /* ---------- Accueil ---------- */
  .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 10px 0; }
  .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 16px; }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px; background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: center; transform: rotate(-4deg);
  }
  .logo-mark svg.ic { width: 20px; height: 20px; }
  .logo-name { font-family: var(--font-title); font-weight: 800; font-size: 20px; color: var(--ink); }
  .logo-name span { color: var(--green); }

  /* ---------- Mascotte ---------- */
  .mascot { display: block; }
  .float { animation: float 3.2s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .mascot-pop { animation: mascotPop .45s cubic-bezier(.2, 1.4, .5, 1) backwards; }
  @keyframes mascotPop { from { opacity: 0; transform: scale(.6) rotate(-6deg); } }
  .mascot-row { display: flex; align-items: center; gap: 13px; margin-bottom: 18px; }
  .mascot-row .mascot-wrap { flex-shrink: 0; }
  .bubble {
    position: relative; background: var(--card);
    border: 2px solid var(--line); border-radius: 14px;
    padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--ink);
    box-shadow: 0 3px 0 var(--line);
  }
  .bubble::before {
    content: ""; position: absolute; left: -8px; top: 50%; margin-top: -7px;
    width: 12px; height: 12px; background: var(--card);
    border-left: 2px solid var(--line); border-bottom: 2px solid var(--line);
    transform: rotate(45deg);
  }

  .home-mascot { display: flex; justify-content: center; margin: 2px 0 10px; }
  .hero h1 { font-size: 31px; font-weight: 800; margin-bottom: 10px; }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(transparent 58%, #F9DE8B 58%);
    padding: 0 2px;
  }
  .hero p.lead { font-size: 15px; color: var(--ink-soft); margin-bottom: 18px; }
  .hero-proof { text-align: center; color: var(--green-dark); font-size: 12.5px; font-weight: 700; margin: 0 0 2px; }

  /* ---------- Écran de préparation ---------- */
  .computing { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .computing .mascot-stage { display: flex; justify-content: center; margin-bottom: 10px; }
  .computing h2 { font-size: 23px; font-weight: 800; text-align: center; }

  /* ---------- Résultat ---------- */
  .rise { animation: rise .45s ease backwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .profile-banner {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--green-dark), var(--green)); color: #fff;
    border-radius: 20px; padding: 18px 94px 18px 18px; min-height: 126px;
  }
  .profile-banner::before {
    content: ""; position: absolute; width: 120px; height: 120px; border-radius: 50%;
    right: -42px; top: -52px; background: rgba(255, 255, 255, .1);
  }
  .profile-banner::after {
    content: ""; position: absolute; width: 24px; height: 24px; border-radius: 8px;
    left: 18px; bottom: -14px; background: var(--amber); transform: rotate(18deg);
  }
  .pb-mascot { position: absolute; right: 2px; bottom: -2px; z-index: 1; }
  .profile-banner .pb-label {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: #CDE9DA; margin-bottom: 5px;
  }
  .profile-banner .pb-label svg.ic { width: 15px; height: 15px; }
  .profile-banner h2 { font-size: 25px; font-weight: 800; margin-bottom: 5px; }
  .profile-banner p { font-size: 13px; line-height: 1.35; color: #E1F3E9; }

  .quick-list {
    background: var(--card); border: 2px solid var(--line); border-radius: 16px;
    margin: 12px 0 8px; overflow: hidden;
  }
  .quick-row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; align-items: center; padding: 10px 13px; border-bottom: 1px solid var(--line); }
  .quick-row:last-child { border-bottom: none; }
  .quick-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); }
  .quick-label::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; background: var(--blue); }
  .quick-row:nth-child(2) .quick-label::before { background: var(--coral); }
  .quick-row:nth-child(3) .quick-label::before { background: var(--violet); }
  .quick-row:nth-child(4) .quick-label::before { background: var(--amber); }
  .quick-value { font-family: var(--font-title); font-size: 15px; font-weight: 800; line-height: 1.2; text-align: right; }

  .card {
    background: var(--card); border: 2px solid var(--line); border-radius: var(--radius);
    padding: 18px; margin-bottom: 14px; box-shadow: 0 3px 0 var(--line);
  }
  .card-title { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .card-title .ct-icon {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-title .ct-icon svg.ic { width: 18px; height: 18px; }
  .card-title h3 { font-size: 17px; font-weight: 800; }

  .spec { padding: 11px 0; border-bottom: 1px solid var(--line); }
  .spec:last-child { border-bottom: none; padding-bottom: 0; }
  .spec:first-of-type { padding-top: 0; }
  .spec-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .spec-name { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); }
  .spec-value { font-size: 15px; font-weight: 700; color: var(--green-dark); text-align: right; }
  .spec-why { font-size: 13.5px; color: var(--ink-soft); margin-top: 4px; }

  .notice { border-radius: var(--radius); padding: 15px 16px; margin-bottom: 14px; font-size: 14px; }
  .notice.warn { background: var(--amber-soft); border: 2px solid #EBD9AE; color: var(--amber-ink); }
  .notice.good { background: var(--green-soft); border: 2px solid #C3E2CE; color: var(--green-dark); }
  .notice strong { display: block; margin-bottom: 4px; font-size: 14.5px; font-family: var(--font-title); }

  .drawer {
    border-top: 1px solid var(--line);
  }
  .drawer summary {
    list-style: none; cursor: pointer; padding: 13px 2px; display: flex; align-items: center;
    font-family: var(--font-title); font-size: 14px; font-weight: 800;
  }
  .drawer summary::-webkit-details-marker { display: none; }
  .drawer-toggle { margin-left: auto; color: var(--green); font-size: 20px; line-height: 1; transition: transform .2s; }
  .drawer[open] .drawer-toggle { transform: rotate(45deg); }
  .drawer-body { padding: 2px 2px 14px; }
  .drawer-subtitle { font-size: 13px; color: var(--ink-soft); margin: 16px 0 4px; font-weight: 700; }
  .drawer-action {
    width: 100%; margin-top: 12px; padding: 11px; border: 0; border-radius: 11px;
    background: var(--green-soft); color: var(--green-dark); cursor: pointer; font: 700 14px var(--font-body);
  }

  .checklist { list-style: none; }
  .checklist li { display: flex; gap: 10px; padding: 7px 0; font-size: 14px; align-items: flex-start; }
  .checklist .cl-check {
    width: 19px; height: 19px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    background: var(--green-soft); color: var(--green);
    display: flex; align-items: center; justify-content: center;
  }
  .checklist .cl-check svg.ic { width: 11px; height: 11px; }

  /* ---------- Vérificateur de modèle (Icecat) ---------- */
  .verify-intro { font-size: 13.5px; color: var(--ink-soft); margin-bottom: 12px; }
  .verify-form input {
    width: 100%; font-family: var(--font-body); font-size: 16px; color: var(--ink);
    background: var(--bg); border: 2px solid var(--line); border-radius: 12px; padding: 12px 14px; outline: none;
    letter-spacing: .03em;
  }
  .verify-form input:focus { border-color: var(--green); background: #fff; }
  .verify-btns { display: flex; gap: 10px; margin-top: 10px; }
  .verify-btns .btn { margin-top: 0; padding: 12px 16px; font-size: 15px; flex: 1; }
  .verify-hint { font-size: 12.5px; color: var(--ink-soft); margin-top: 10px; }
  .verify-hint code {
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; cursor: pointer;
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; color: var(--green-dark);
  }
  .verify-status { margin-top: 12px; font-size: 13px; color: var(--ink-soft); }
  #verify-out { margin-top: 14px; }
  #verify-out .mascot-row { margin: 4px 0 0; }
  .verify-product { font-size: 14px; margin-bottom: 6px; }
  .verify-caution { font-size: 12.5px; color: var(--ink-soft); }
  .v-list { list-style: none; margin-top: 4px; }
  .v-list li { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; align-items: flex-start; }
  .v-list li:last-child { border-bottom: none; }
  .v-dot {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
  }
  .v-dot svg.ic { width: 12px; height: 12px; }
  .v-ok .v-dot { background: var(--green-soft); color: var(--green); }
  .v-low .v-dot { background: var(--coral-soft); color: var(--coral); }
  .v-unk .v-dot { background: var(--line); color: var(--ink-soft); }
  .v-list strong { display: block; font-size: 13.5px; }
  .v-list .v-txt { color: var(--ink-soft); }
  .notice.neutral { background: #F1EDE4; border: 2px solid var(--line); color: #55604F; }

  /* ---------- Reprise de session (accueil) ---------- */
  .resume {
    background: var(--card); border: 2px solid var(--green-border); border-radius: var(--radius);
    padding: 10px 12px; margin-bottom: 12px;
  }
  .resume-top { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .resume-top svg.ic { width: 18px; height: 18px; color: var(--green-dark); }
  .resume-actions { display: flex; gap: 10px; }
  .resume-actions button {
    flex: 1; font-family: var(--font-title); font-weight: 700; font-size: 14px; cursor: pointer;
    border-radius: 11px; padding: 8px; border: none;
  }
  .resume-actions .r-go { background: var(--green); color: #fff; }
  .resume-actions .r-new { background: var(--bg); color: var(--ink-soft); border: 2px solid var(--line); }

  /* ---------- Scanner code-barres ---------- */
  .scan-overlay {
    position: fixed; inset: 0; z-index: 30; background: rgba(20, 24, 18, .92);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
  }
  .scan-overlay video { width: 100%; max-width: 420px; border-radius: 16px; background: #000; }
  .scan-frame { position: relative; width: 100%; max-width: 420px; }
  .scan-line {
    position: absolute; left: 6%; right: 6%; top: 50%; height: 3px; background: var(--coral);
    box-shadow: 0 0 12px var(--coral); border-radius: 2px; animation: scanMove 1.8s ease-in-out infinite;
  }
  @keyframes scanMove { 0%, 100% { top: 22%; } 50% { top: 78%; } }
  .scan-hint { color: #fff; font-size: 14.5px; font-weight: 600; text-align: center; margin: 18px 0; max-width: 320px; }
  .scan-close {
    background: #fff; color: var(--ink); border: none; cursor: pointer;
    font-family: var(--font-title); font-weight: 700; font-size: 15px; padding: 12px 26px; border-radius: 99px;
  }

  .result-actions { margin: 2px 0 12px; }
  .result-actions .btn { margin-top: 8px; padding: 13px; }
  .restart-link {
    display: block; margin: 12px auto 0; background: none; border: none; color: var(--ink-soft); cursor: pointer;
    font: 700 13px var(--font-body); text-decoration: underline; text-underline-offset: 3px;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--ink); color: #fff; font-size: 14px; font-weight: 600;
    padding: 11px 20px; border-radius: 99px; opacity: 0; pointer-events: none; transition: all .25s;
    white-space: nowrap; z-index: 10;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer { text-align: center; font-size: 12.5px; color: var(--ink-soft); padding-top: 26px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* =====================================================
   QUEL PC — V1
   Questionnaire (6 questions, 1 par écran, branchement
   conditionnel), moteur de recommandation, écran de
   préparation, fiche profil de sortie.
   ===================================================== */

/* ---------- Icônes maison ----------
   Set "duotone contour" dessiné pour ce projet : trait épais
   arrondi + remplissage translucide (classe .d), aplats pleins
   ponctuels (classe .f). Pas de bibliothèque. */

const ORDER = ["usage", "work", "mobility", "plug", "os", "budget"];

/* ---------- Encodage de l'état (lien partageable) ----------
   Un char par réponse, segments séparés par "." dans l'ORDRE.
   Ex. state {usage:[web,office], work:solo, mobility:home, os:windows, budget:b2}
   → "wo.a.h..w.2" : court, lisible, sûr dans une URL. */

const CODEC = {
  usage:    { web: "w", office: "o", photo: "p", gaming: "g", media: "m" },
  work:     { solo: "a", multi: "b", heavy: "c" },
  mobility: { home: "h", sometimes: "s", daily: "d" },
  plug:     { plug: "p", noplug: "n" },
  os:       { windows: "w", apple: "a", any: "x" },
  budget:   { b1: "1", b2: "2", b3: "3", b4: "4", b0: "0" },
};
const DECODE = {};
for (const field in CODEC) {
  DECODE[field] = {};
  for (const k in CODEC[field]) DECODE[field][CODEC[field][k]] = k;
}

function encodeState(s) {
  return [
    (s.usage || []).map((u) => CODEC.usage[u] || "").join(""),
    CODEC.work[s.work] || "",
    CODEC.mobility[s.mobility] || "",
    CODEC.plug[s.plug] || "",
    CODEC.os[s.os] || "",
    CODEC.budget[s.budget] || "",
  ].join(".");
}

function decodeState(str) {
  const parts = String(str || "").split(".");
  if (parts.length < 6) return null;
  const s = {};
  const usage = parts[0].split("").map((c) => DECODE.usage[c]).filter(Boolean);
  if (usage.length) s.usage = usage;
  if (DECODE.work[parts[1]]) s.work = DECODE.work[parts[1]];
  if (DECODE.mobility[parts[2]]) s.mobility = DECODE.mobility[parts[2]];
  if (DECODE.plug[parts[3]]) s.plug = DECODE.plug[parts[3]];
  if (DECODE.os[parts[4]]) s.os = DECODE.os[parts[4]];
  if (DECODE.budget[parts[5]]) s.budget = DECODE.budget[parts[5]];
  return s;
}

// Un profil est "complet" quand toutes les réponses requises sont là.
function isComplete(s) {
  if (!s || !s.usage || !s.usage.length) return false;
  if (!s.work || !s.mobility || !s.os || !s.budget) return false;
  const plugNeeded = QUESTIONS.plug.condition(s);
  if (plugNeeded && !s.plug) return false;
  return true;
}

function profileLink(s) {
  return location.origin + location.pathname + "#r=" + encodeURIComponent(encodeState(s));
}

/* ---------- Persistance (reprise de session) ---------- */

const LS_SESSION = "quelpc.session"; // questionnaire en cours
const LS_LAST = "quelpc.last";       // dernier profil terminé

function saveSession() {
  try { localStorage.setItem(LS_SESSION, JSON.stringify({ state, currentStep })); } catch (e) { /* stockage indispo */ }
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem(LS_SESSION) || "null"); } catch (e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(LS_SESSION); } catch (e) { /* stockage indispo */ }
}
function saveLast(s) {
  try { localStorage.setItem(LS_LAST, encodeState(s)); } catch (e) { /* stockage indispo */ }
}
function loadLast() {
  try {
    const code = localStorage.getItem(LS_LAST);
    if (!code) return null;
    const s = decodeState(code);
    return isComplete(s) ? s : null;
  } catch (e) { return null; }
}

let state = {};

function activeSteps() {
  return ORDER.filter((id) => {
    const q = QUESTIONS[id];
    return !q.condition || q.condition(state);
  });
}

/* ---------- Moteur de recommandation ----------
   L'usage fixe une bande de puissance (0, 1, 2).
   La façon de travailler la module d'un cran.
   Le budget plafonne ; en cas de conflit, on affiche
   l'arbitrage honnêtement au lieu de mentir.        */

const BUDGET_RANK = { b1: 1, b2: 2, b3: 3, b4: 4 };
const BUDGET_LABEL = {
  b1: "moins de 500 €", b2: "500 à 800 €", b3: "800 à 1 200 €", b4: "plus de 1 200 €",
};
const BUDGET_CAP = {
  b1: { band: 1, ram: 16, storageGo: 512, dedicatedGPU: false },
  b2: { band: 1, ram: 16, storageGo: 512, dedicatedGPU: true },
  b3: { band: 2, ram: 32, storageGo: 1000, dedicatedGPU: true },
  b4: { band: 2, ram: 32, storageGo: 1000, dedicatedGPU: true },
};

function computeProfile(s) {
  const usage = s.usage || [];

  // Besoin idéal, avant de le confronter au budget.
  const bandByUsage = { web: 0, media: 0, office: 1, photo: 2, gaming: 2 };
  let requestedBand = Math.max(0, ...usage.map((u) => bandByUsage[u]));
  if (s.work === "heavy") requestedBand = Math.max(requestedBand, 2);
  const wantsGaming = usage.includes("gaming");
  const heavyMedia = usage.includes("photo");

  // Le budget plafonne réellement la fiche proposée.
  const budgetCap = BUDGET_CAP[s.budget] || null;
  const band = budgetCap ? Math.min(requestedBand, budgetCap.band) : requestedBand;
  const dedicatedAffordable = !budgetCap || budgetCap.dedicatedGPU;
  const needsGPU = wantsGaming && dedicatedAffordable;
  const recommendsGPU = heavyMedia && dedicatedAffordable;

  // Mémoire : assez pour l'usage, sans dépasser ce que l'enveloppe permet.
  const ramLadder = [8, 16, 32];
  let ramIdx = band >= 2 ? 1 : 0;
  if (s.work === "multi" || s.work === "heavy") ramIdx = Math.min(ramIdx + 1, 2);
  if (wantsGaming || heavyMedia) ramIdx = Math.max(ramIdx, 1);
  const ram = Math.min(ramLadder[ramIdx], budgetCap ? budgetCap.ram : 32);

  let storageGo = 256;
  if (band >= 1) storageGo = 512;
  if (heavyMedia || wantsGaming) storageGo = 1000;
  if (budgetCap) storageGo = Math.min(storageGo, budgetCap.storageGo);
  const storage = storageGo >= 1000 ? "SSD de 1 To" : "SSD de " + storageGo + " Go";

  // Processeur en langage clair
  const cpuByBand = [
    { value: "Core i3 / Ryzen 3 récent", hint: "un modèle simple et récent suffit" },
    { value: "Core i5 / Ryzen 5 récent", hint: "le meilleur équilibre prix et confort" },
    { value: "Puce haute performance", hint: "une série H ou équivalente, pensée pour les tâches lourdes" },
  ];
  const cpu = cpuByBand[band];

  // Écran et poids selon la mobilité
  const mobilityMap = {
    home:      { screen: "15 à 17 pouces", weight: "Peu importe, il ne bougera pas", battery: null },
    sometimes: { screen: "14 à 15 pouces", weight: "Moins de 1,8 kg", battery: "Autonomie correcte (une demi-journée)" },
    daily:     { screen: "13 à 14 pouces", weight: "Moins de 1,5 kg", battery: "Bonne autonomie" },
  };
  const mob = mobilityMap[s.mobility];
  let battery = mob.battery;
  if (s.plug === "noplug") battery = "Grande autonomie : il doit tenir une journée entière sans prise";
  if (s.plug === "plug" && s.mobility === "sometimes") battery = null;

  // Prix réaliste du besoin idéal, indépendamment du compromis affiché.
  let minBudget = requestedBand === 0 ? "b1" : requestedBand === 1 ? "b2" : "b3";
  if (wantsGaming) minBudget = "b2";
  if (s.os === "apple") minBudget = "b4";

  // Un seul message d'arbitrage : court, concret, actionnable.
  const notices = [];
  const budgetKnown = s.budget && s.budget !== "b0";
  const budgetConflict = budgetKnown && BUDGET_RANK[s.budget] < BUDGET_RANK[minBudget];

  if (budgetConflict) {
    if (s.os === "apple") {
      notices.push({
        type: "warn",
        title: "Le neuf dépasse votre budget",
        text: "Mac neuf hors budget : visez le reconditionné garanti ou un PC Windows.",
      });
    } else if (wantsGaming && s.budget === "b1") {
      notices.push({
        type: "warn",
        title: "Sous 500 €, on joue malin",
        text: "Sous 500 €, visez les jeux légers. Pour les jeux récents : occasion ou budget 500–800 €.",
      });
    } else {
      notices.push({
        type: "warn",
        title: "J'ai ajusté la recommandation",
        text: "Le besoin idéal coûte plutôt " + BUDGET_LABEL[minBudget] + " ; voici le compromis réaliste.",
      });
    }
  } else if (budgetKnown && BUDGET_RANK[s.budget] >= BUDGET_RANK[minBudget] + 2) {
    notices.push({
      type: "good",
      title: "Bonne nouvelle : gardez la différence",
      text: "Vos besoins sont couverts dès " + BUDGET_LABEL[minBudget] + ".",
    });
  } else if (!budgetKnown) {
    notices.push({
      type: "good",
      title: "Votre ordre de grandeur",
      text: "Comptez environ " + BUDGET_LABEL[minBudget] + ".",
    });
  } else if (s.os === "apple" && wantsGaming) {
    notices.push({
      type: "warn",
      title: "Pour jouer, Windows reste plus simple",
      text: "Vérifiez d'abord que vos jeux existent sur macOS.",
    });
  }

  // Système d'exploitation
  let osValue, osWhy;
  if (s.os === "apple") {
    osValue = "Mac (macOS)";
    osWhy = "Vous êtes déjà dans l'univers Apple : vous garderez vos repères et tout se synchronisera avec votre iPhone ou iPad.";
  } else if (s.os === "windows") {
    osValue = "Windows";
    osWhy = "C'est ce que vous connaissez déjà : aucun réapprentissage, et le plus grand choix de machines.";
  } else {
    osValue = "Windows";
    osWhy = "Sans habitude particulière, c'est le choix le plus simple : le plus répandu, le plus grand choix de machines et de prix.";
  }

  // Nom du profil
  const profileNames = [
    "L'essentiel",
    "Le polyvalent",
    wantsGaming ? "Le joueur costaud" : "Le créatif costaud",
  ];
  const profileName = budgetConflict
    ? (wantsGaming ? "Le joueur malin" : heavyMedia ? "Le créatif malin" : "Le compromis malin")
    : wantsGaming && band === 1 ? "Le joueur équilibré" : profileNames[band];

  // Raisonnement transparent : chaque réponse → conséquence
  const usageLabels = usage.map((u) => QUESTIONS.usage.options.find((o) => o.id === u).label.toLowerCase());
  const workLabel = QUESTIONS.work.options.find((o) => o.id === s.work);

  const specs = [
    {
      name: "Processeur", value: cpu.value,
      why: "Pour « " + usageLabels.join(" » et « ") + " », " + cpu.hint + ".",
    },
    {
      name: "Mémoire vive", value: ram + " Go",
      why: s.work === "solo"
        ? "Vous faites une chose à la fois : inutile de payer pour de la mémoire que vous n'utiliserez pas."
        : "Parce que vous avez répondu « " + workLabel.label.toLowerCase() + " » : c'est la mémoire qui permet de tout garder ouvert sans ralentir.",
    },
    {
      name: "Stockage", value: storage,
      why: "Un SSD, jamais un disque dur classique : c'est ce qui rend un ordinateur rapide à l'allumage et au quotidien." +
        (heavyMedia || usage.includes("gaming") ? " La grande taille, c'est pour vos photos, vidéos ou jeux, qui prennent beaucoup de place." : ""),
    },
    {
      name: "Carte graphique",
      value: needsGPU ? "Dédiée" : wantsGaming ? "Intégrée — jeux légers" : recommendsGPU ? "Dédiée recommandée" : "Celle intégrée suffit",
      why: needsGPU
        ? "C'est le minimum réaliste pour les jeux récents."
        : wantsGaming
          ? "À ce budget, une carte dédiée ferait trop sacrifier le reste. Pour les jeux récents, visez l'occasion ou augmentez le budget."
        : recommendsGPU
          ? "Pour le montage vidéo, elle accélère nettement le travail. Un vrai plus, sans être bloquant pour débuter."
          : "Pour vos usages, la puce graphique incluse dans le processeur fait très bien le travail. Économie assurée.",
    },
    {
      name: "Écran", value: mob.screen,
      why: s.mobility === "home"
        ? "Il ne bouge pas : autant prendre grand et confortable pour les yeux."
        : "Le bon équilibre entre confort de lecture et facilité de transport pour vos déplacements.",
    },
    {
      name: "Poids", value: mob.weight,
      why: s.mobility === "daily"
        ? "Transporté tous les jours, chaque centaine de grammes compte dans le sac."
        : s.mobility === "sometimes"
          ? "Transporté de temps en temps : léger, sans que ce soit le critère numéro un."
          : "Un ordinateur qui reste à la maison peut être plus lourd sans que ça vous gêne.",
    },
  ];

  if (battery) {
    specs.push({
      name: "Batterie", value: battery,
      why: s.plug === "noplug"
        ? "Vous êtes souvent loin d'une prise : c'est un critère décisif, vérifiez-le en priorité."
        : "Vous vous déplacez : une autonomie correcte évite de trimballer le chargeur partout.",
    });
  }

  specs.push({ name: "Système", value: osValue, why: osWhy });

  // Check-list avant achat
  const checklist = [
    "La mémoire vive fait bien " + ram + " Go (parfois cachée dans la fiche technique sous « RAM »).",
    "Le stockage est un SSD, pas un « disque dur » — c'est écrit sur la fiche.",
    "Le processeur correspond bien à ce niveau : " + cpu.value.toLowerCase() + ".",
  ];
  if (needsGPU) checklist.push("Une carte graphique dédiée est bien présente (NVIDIA ou AMD, mentionnée à part du processeur).");
  if (s.mobility !== "home") checklist.push("Le poids réel : " + mob.weight.toLowerCase() + ", vérifiez-le sur la fiche, pas sur la photo.");
  if (battery) checklist.push("L'autonomie annoncée par le fabricant — retirez environ un tiers pour avoir la vraie.");
  checklist.push("Le clavier est bien AZERTY (piège classique des sites étrangers).");

  // Cibles machine-lisibles : servent au vérificateur (comparaison Icecat).
  const targets = {
    ramGo: ram,
    ssd: true,
    storageGo: storageGo,
    cpuTier: band,                                   // 0, 1 ou 2 = niveau minimum
    gpu: needsGPU ? "required" : recommendsGPU ? "recommended" : "integrated",
    os: s.os === "apple" ? "mac" : "windows",
  };

  const highlights = [
    { label: "Processeur", value: cpu.value },
    { label: "Mémoire", value: ram + " Go" },
    { label: "Stockage", value: storage },
    wantsGaming
      ? { label: "Jeux", value: needsGPU ? "Carte dédiée" : "Jeux légers seulement" }
      : { label: "Format", value: mob.screen },
  ];

  return { name: profileName, band, ram, storage, storageGo, cpu, needsGPU, specs, notices, checklist, minBudget, targets, highlights, budgetConflict };
}

function engineSelfCheck() {
  const cheapGamer = computeProfile({ usage: ["gaming"], work: "heavy", mobility: "home", os: "windows", budget: "b1" });
  const regularGamer = computeProfile({ usage: ["gaming"], work: "solo", mobility: "home", os: "windows", budget: "b2" });
  const simpleAndWide = computeProfile({ usage: ["web"], work: "solo", mobility: "home", os: "windows", budget: "b4" });
  const apiProduct = normalizeIcecatProduct({
    EssentialInfo: { Brand: "HP", ProductName: "Test" },
    FeaturesGroups: [{ Features: [
      { RawValue: "AMD Ryzen™ 5", Feature: { ID: 2196 } },
      { RawValue: "16", Feature: { ID: 11381 } },
      { RawValue: "512", Feature: { ID: 3318 } },
      { RawValue: "512", Feature: { ID: 5586 } },
    ] }],
  }, "12345678");
  return cheapGamer.band === 1 && cheapGamer.ram === 16 && cheapGamer.storageGo === 512 && cheapGamer.targets.gpu === "integrated" && cheapGamer.budgetConflict
    && regularGamer.targets.gpu === "required" && regularGamer.ram === 16 && !regularGamer.budgetConflict
    && simpleAndWide.band === 0 && simpleAndWide.ram === 8
    && apiProduct.specs.cpuTier === 1 && apiProduct.specs.ramGo === 16 && apiProduct.specs.storageType === "SSD"
    && isValidGTIN(ICECAT_SAMPLE_EAN) && !isValidGTIN("0199485877786");
}

/* ---------- Source de données produit (Icecat) ---------- */

const ICECAT_ENDPOINT = "https://live.icecat.biz/api/";
// ponytail: compte Icecat de démonstration ; utiliser le compte Open Icecat du projet avant trafic réel.
const ICECAT_SHOP = "openIcecat-live";
const ICECAT_SAMPLE_EAN = "0199485877785";

const DEMO_CATALOG = {
  "3701234500010": { brand: "PortaBook (démo)", name: "Air 14", specs: { ramGo: 16, storageGo: 512, storageType: "SSD", cpuName: "Intel Core i5-1335U", cpuTier: 1, gpuDedicated: false, os: "windows", weightKg: 1.4, screenIn: 14 } },
  "3701234500027": { brand: "BudgetMate (démo)", name: "15", specs: { ramGo: 8, storageGo: 256, storageType: "SSD", cpuName: "Intel Core i3-1215U", cpuTier: 0, gpuDedicated: false, os: "windows", weightKg: 1.8, screenIn: 15 } },
  "3701234500034": { brand: "OldStock (démo)", name: "15 HDD", specs: { ramGo: 8, storageGo: 1000, storageType: "HDD", cpuName: "Intel Celeron N4020", cpuTier: 0, gpuDedicated: false, os: "windows", weightKg: 2.0, screenIn: 15 } },
  "3701234500041": { brand: "FruitBook (démo)", name: "Air 13", specs: { ramGo: 16, storageGo: 512, storageType: "SSD", cpuName: "Puce Apple série M", cpuTier: 2, gpuDedicated: false, os: "mac", weightKg: 1.24, screenIn: 13 } },
  "3701234500058": { brand: "PlayForce (démo)", name: "16 RTX", specs: { ramGo: 32, storageGo: 1000, storageType: "SSD", cpuName: "AMD Ryzen 7", cpuTier: 2, gpuDedicated: true, os: "windows", weightKg: 2.3, screenIn: 16 } },
};
function cleanEAN(raw) {
  return String(raw || "").replace(/\D/g, "");
}

function isValidGTIN(value) {
  if (![8, 12, 13, 14].includes(value.length)) return false;
  const digits = [...value].map(Number);
  const check = digits.pop();
  const sum = digits.reverse().reduce((total, digit, index) => total + digit * (index % 2 ? 1 : 3), 0);
  return (10 - sum % 10) % 10 === check;
}

function cpuTierFromName(name) {
  name = String(name || "").replace(/[™®]/g, "");
  if (/Ryzen\s*[79]|Core(?:\s+Ultra)?\s*[79]|Core\s*i[79]/i.test(name)) return 2;
  if (/Ryzen\s*5|Core(?:\s+Ultra)?\s*5|Core\s*i5/i.test(name)) return 1;
  return name ? 0 : undefined;
}

function normalizeIcecatProduct(data, ean) {
  const info = data.GeneralInfo || data.EssentialInfo || {};
  const features = (data.FeaturesGroups || []).flatMap((group) => group.Features || []);
  const byId = new Map(features.map((feature) => [String(feature.Feature && feature.Feature.ID), feature]));
  const feature = (id) => byId.get(String(id));
  const raw = (id) => feature(id) && feature(id).RawValue;
  const local = (id) => feature(id) && (feature(id).LocalValue || feature(id).PresentationValue || feature(id).RawValue);
  const number = (id) => raw(id) === undefined ? undefined : Number(raw(id));
  const yesNo = (id) => raw(id) === undefined ? undefined : /^(Y|yes|oui|true|1)$/i.test(String(raw(id)));

  const cpuName = [local(2196), local(47)].filter(Boolean).join(" ");
  const osName = local(3233);
  let storageGo = number(3318);
  if (storageGo && /\b(To|TB)\b/i.test(String(local(3318)))) storageGo *= 1000;
  let weightKg = number(94);
  if (weightKg > 50) weightKg /= 1000;

  if (!info.Brand && !info.ProductName && !info.Title) return null;
  return {
    ean,
    brand: info.Brand || "",
    name: info.ProductName || info.Title,
    specs: {
      ramGo: number(11381),
      storageGo,
      storageType: feature(5586) ? "SSD" : undefined,
      cpuName: cpuName || undefined,
      cpuTier: cpuTierFromName(cpuName),
      gpuDedicated: yesNo(27905),
      os: /mac/i.test(String(osName)) ? "mac" : /windows/i.test(String(osName)) ? "windows" : osName ? "other" : undefined,
      osName,
      weightKg,
      screenIn: number(944),
    },
  };
}

// Renvoie { found, product?, source } — jamais un verdict inventé.
async function fetchProductByEAN(raw) {
  const ean = cleanEAN(raw);
  if (!isValidGTIN(ean)) return { found: false, reason: "format" };

  const demo = DEMO_CATALOG[ean];
  if (demo) return { found: true, source: "démo", product: { ean, brand: demo.brand, name: demo.name, specs: demo.specs } };

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 7000);
  try {
    const url = new URL(ICECAT_ENDPOINT);
    url.search = new URLSearchParams({ shopname: ICECAT_SHOP, lang: "fr", content: "essentialinfo,featuregroups", GTIN: ean });
    const response = await fetch(url, { headers: { Accept: "application/json" }, signal: controller.signal });
    if (!response.ok) return { found: false, reason: "service" };
    const json = await response.json();
    const product = json.msg === "OK" && json.data ? normalizeIcecatProduct(json.data, ean) : null;
    return product ? { found: true, source: "Icecat", product } : { found: false, reason: "unknown" };
  } catch (error) {
    return { found: false, reason: "service" };
  } finally {
    clearTimeout(timeout);
  }
}

/* Compare les specs réelles d'un produit aux cibles du profil.
   Statuts : ok (correspond), low (en-dessous), unknown (info absente).
   Formulation prudente : « d'après la référence, ce modèle a normalement… » */

function compareToProfile(product, targets) {
  const sp = product.specs || {};
  const lines = [];

  // Processeur
  if (typeof sp.cpuTier === "number") {
    lines.push({
      status: sp.cpuTier >= targets.cpuTier ? "ok" : "low",
      label: "Processeur",
      detail: "D'après la référence, ce modèle a normalement un " + (sp.cpuName || "processeur") +
        (sp.cpuTier >= targets.cpuTier ? " — au niveau attendu." : " — un cran en dessous de l'idéal pour vos usages."),
    });
  } else {
    lines.push({ status: "unknown", label: "Processeur", detail: "Information non disponible sur cette référence." });
  }

  // Mémoire vive
  if (typeof sp.ramGo === "number") {
    lines.push({
      status: sp.ramGo >= targets.ramGo ? "ok" : "low",
      label: "Mémoire vive",
      detail: sp.ramGo + " Go annoncés" + (sp.ramGo >= targets.ramGo
        ? " — conforme (" + targets.ramGo + " Go visés)."
        : " — sous les " + targets.ramGo + " Go recommandés pour vous."),
    });
  } else {
    lines.push({ status: "unknown", label: "Mémoire vive", detail: "Information non disponible sur cette référence." });
  }

  // Stockage (type + capacité)
  if (sp.storageType) {
    const isSSD = sp.storageType.toUpperCase() === "SSD";
    const bigEnough = typeof sp.storageGo !== "number" || sp.storageGo >= targets.storageGo;
    lines.push({
      status: isSSD && bigEnough ? "ok" : "low",
      label: "Stockage",
      detail: (sp.storageGo ? sp.storageGo + " Go " : "") + sp.storageType +
        (isSSD ? "" : " — attention, un disque dur classique, bien plus lent qu'un SSD.") +
        (isSSD && !bigEnough ? " — un peu juste par rapport aux " + targets.storageGo + " Go visés." : (isSSD ? " — parfait." : "")),
    });
  } else {
    lines.push({ status: "unknown", label: "Stockage", detail: "Information non disponible sur cette référence." });
  }

  // Carte graphique
  if (typeof sp.gpuDedicated === "boolean") {
    if (targets.gpu === "required") {
      lines.push({
        status: sp.gpuDedicated ? "ok" : "low",
        label: "Carte graphique",
        detail: sp.gpuDedicated ? "Carte dédiée présente — indispensable pour vous, c'est bon." : "Pas de carte dédiée — bloquant pour les jeux récents.",
      });
    } else if (targets.gpu === "recommended") {
      lines.push({
        status: sp.gpuDedicated ? "ok" : "low",
        label: "Carte graphique",
        detail: sp.gpuDedicated ? "Carte dédiée présente — un vrai plus pour vos créations." : "Graphique intégré — suffisant pour débuter, mais plus lent en montage.",
      });
    } else {
      lines.push({
        status: "ok",
        label: "Carte graphique",
        detail: sp.gpuDedicated ? "Carte dédiée présente — au-delà de vos besoins, mais pas un défaut." : "Graphique intégré — suffisant pour vos usages.",
      });
    }
  }

  // Système
  if (sp.os) {
    const osFr = sp.os === "mac" ? "macOS (Mac)" : sp.os === "windows" ? "Windows" : (sp.osName || "Autre système");
    lines.push({
      status: sp.os === targets.os ? "ok" : "low",
      label: "Système",
      detail: sp.os === targets.os ? osFr + " — conforme à votre habitude." : osFr + " — différent de l'habitude que vous nous avez indiquée.",
    });
  }

  const known = lines.filter((l) => l.status !== "unknown");
  const lows = known.filter((l) => l.status === "low");
  const score = known.length ? (known.length - lows.length) / known.length : 0;

  let level, tone, mascotPose, headline;
  if (!known.length) {
    level = "Impossible à évaluer"; tone = "neutral"; mascotPose = "think";
    headline = "Je n'ai pas assez d'informations sur cette référence pour trancher.";
  } else if (lows.length === 0) {
    level = "Correspond bien"; tone = "good"; mascotPose = "up";
    headline = "Bonne nouvelle : d'après la référence, ce modèle colle à votre profil.";
  } else if (score >= 0.6) {
    level = "Correspond en partie"; tone = "warn"; mascotPose = "think";
    headline = "Ça peut aller, mais regardez les points en orange avant de vous décider.";
  } else {
    level = "Ne correspond pas assez"; tone = "warn"; mascotPose = "open";
    headline = "À votre place, je continuerais à chercher : trop d'écarts avec votre profil.";
  }

  return { level, tone, mascotPose, headline, lines };
}

/* ---------- Fiche mémo en image (canvas) ---------- */

function svgToImage(svg) {
  return new Promise((resolve, reject) => {
    const withNs = svg.replace("<svg ", '<svg xmlns="http://www.w3.org/2000/svg" ');
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(withNs);
  });
}

async function generateMemoCanvas(p) {
  try { await document.fonts.ready; } catch (e) { /* polices système en secours */ }

  const scale = 2;
  const W = 540;
  const pad = 28;
  const rowH = 62;
  const specsTop = 250;
  const H = specsTop + p.specs.length * rowH + 118;

  const cv = document.createElement("canvas");
  cv.width = W * scale; cv.height = H * scale;
  const ctx = cv.getContext("2d");
  ctx.scale(scale, scale);

  const rr = (x, y, w, h, r) => {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); }
    else { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
  };

  // Fond
  ctx.fillStyle = "#FBF6EE"; ctx.fillRect(0, 0, W, H);

  // Bannière profil
  ctx.fillStyle = "#0E5E3E"; rr(pad, pad, W - pad * 2, 170, 22); ctx.fill();
  ctx.fillStyle = "#A9DCC2";
  ctx.font = '700 15px "Inter", sans-serif';
  ctx.fillText("MA FICHE MÉMO — QUEL PC", pad + 26, pad + 44);
  ctx.fillStyle = "#FFFFFF";
  ctx.font = '800 34px "Bricolage Grotesque", sans-serif';
  ctx.fillText(p.name, pad + 26, pad + 92);
  ctx.fillStyle = "#CDE9DA";
  ctx.font = '500 15px "Inter", sans-serif';
  ctx.fillText("Le type d'ordinateur qui vous correspond.", pad + 26, pad + 124);

  // Puce dans la bannière
  try {
    const puce = await svgToImage(mascot("up", 120));
    ctx.drawImage(puce, W - pad - 118, pad + 74, 100, 80);
  } catch (e) { /* mascotte optionnelle */ }

  // Titre section
  ctx.fillStyle = "#23281E";
  ctx.font = '800 20px "Bricolage Grotesque", sans-serif';
  ctx.fillText("À montrer en magasin", pad + 4, specsTop - 18);

  // Lignes de specs
  p.specs.forEach((s, i) => {
    const y = specsTop + i * rowH;
    ctx.fillStyle = "#FFFFFF"; rr(pad, y, W - pad * 2, rowH - 12, 14); ctx.fill();
    ctx.fillStyle = "#6D7268";
    ctx.font = '700 12px "Inter", sans-serif';
    ctx.fillText(s.name.toUpperCase(), pad + 18, y + 22);
    ctx.fillStyle = "#0E5E3E";
    ctx.font = '700 18px "Inter", sans-serif';
    ctx.fillText(s.value, pad + 18, y + 43);
  });

  // Pied de page
  const fy = H - 74;
  ctx.strokeStyle = "#E8E1D4"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, fy); ctx.lineTo(W - pad, fy); ctx.stroke();
  ctx.fillStyle = "#6D7268";
  ctx.font = '500 13px "Inter", sans-serif';
  ctx.fillText("Généré le " + new Date().toLocaleDateString("fr-FR") + " · QuelPC — conseil neutre", pad, fy + 26);
  ctx.fillStyle = "#0E5E3E";
  ctx.font = '700 13px "Inter", sans-serif';
  ctx.fillText("Vérifiez le clavier AZERTY et que le stockage est bien un SSD.", pad, fy + 48);

  return cv;
}

async function saveMemoImage(p) {
  showToast("Je prépare votre fiche…");
  let canvas;
  try { canvas = await generateMemoCanvas(p); } catch (e) { showToast("Souci de génération, réessayez"); return; }

  const blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
  if (!blob) { showToast("Souci de génération, réessayez"); return; }
  const file = new File([blob], "ma-fiche-quelpc.png", { type: "image/png" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: "Ma fiche — Quel PC" }); return; } catch (e) { /* annulé → on télécharge */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "ma-fiche-quelpc.png";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  showToast("Fiche enregistrée dans vos téléchargements");
}

async function shareProfileLink() {
  const url = profileLink(state);
  if (navigator.share) {
    try { await navigator.share({ title: "Mon profil — Quel PC", text: "Voici le type d'ordinateur qu'il me faut :", url }); return; } catch (e) { /* annulé */ }
  }
  try { await navigator.clipboard.writeText(url); showToast("Lien copié ! Envoyez-le par SMS ou WhatsApp"); }
  catch (e) { showToast("Copie impossible, lien : " + url); }
}

/* ---------- Rendu ---------- */

const app = document.getElementById("app");

function render() {
  if (screen === "home") renderHome();
  else if (screen === "question") renderQuestion();
  else if (screen === "computing") renderComputing();
  else renderResult();
  window.scrollTo(0, 0);
}

function renderHome() {
  const session = loadSession();
  const hasSession = session && session.state && session.state.usage && !isComplete(session.state);
  const last = loadLast();

  const resumeBlock = hasSession ? `
    <div class="resume">
      <div class="resume-top">${ic("refresh")} Reprendre où vous en étiez ?</div>
      <div class="resume-actions">
        <button class="r-go" id="resume-go">Reprendre</button>
        <button class="r-new" id="resume-new">Recommencer</button>
      </div>
    </div>` : (last ? `
    <div class="resume">
      <div class="resume-top">${ic("compass")} Revoir votre dernier profil</div>
      <div class="resume-actions">
        <button class="r-go" id="see-last">Revoir mon profil</button>
        <button class="r-new" id="resume-new">Nouveau test</button>
      </div>
    </div>` : "");

  app.innerHTML = `
    <div class="screen hero">
      <div class="logo">
        <span class="logo-mark">${ic("laptop")}</span>
        <span class="logo-name">Quel<span>PC</span></span>
      </div>
      <div class="home-mascot"><span class="float mascot-pop">${mascot("wave", 92)}</span></div>
      <h1>Quel ordinateur est fait <em>pour vous</em> ?</h1>
      <p class="lead">6 questions simples. Aucun jargon.</p>
      ${resumeBlock}
      <p class="hero-proof">Neutre · Gratuit · Sans compte</p>
      <button class="btn" id="start">Trouver mon ordinateur</button>
    </div>`;

  const start = () => { state = {}; currentStep = 0; clearSession(); screen = "question"; render(); };
  document.getElementById("start").onclick = start;

  const goResume = document.getElementById("resume-go");
  if (goResume) goResume.onclick = () => { state = session.state; currentStep = session.currentStep || 0; screen = "question"; render(); };
  const newBtn = document.getElementById("resume-new");
  if (newBtn) newBtn.onclick = start;
  const seeLast = document.getElementById("see-last");
  if (seeLast) seeLast.onclick = () => { state = last; currentStep = 0; screen = "result"; render(); };
}

function renderQuestion() {
  const steps = activeSteps();
  if (currentStep >= steps.length) { screen = "computing"; render(); return; }
  const qid = steps[currentStep];
  const q = QUESTIONS[qid];
  const selected = q.multi ? (state[qid] || []) : state[qid];
  const isSelected = (id) => q.multi ? selected.includes(id) : selected === id;
  const hasSelection = q.multi ? selected.length > 0 : !!selected;

  app.innerHTML = `
    <div class="question-page">
      <div class="topbar">
        <div class="progress-segs">
          ${steps.map((_, i) => `<span class="seg ${i < currentStep ? "done" : i === currentStep ? "now" : ""}"></span>`).join("")}
        </div>
        <span class="step-count">${currentStep + 1}/${steps.length}</span>
      </div>
      <div class="question-content">
        <div class="mascot-row" id="mascot-row">
          <span class="mascot-wrap mascot-pop">${mascot(MASCOT_BY_QUESTION[qid].pose, 72)}</span>
          <span class="bubble">${MASCOT_BY_QUESTION[qid].quip}</span>
        </div>
        <h2 class="q-title">${q.title}</h2>
        <p class="q-help">${q.help}</p>
        <div class="options">
          ${q.options.map((o) => `
            <button class="option ${isSelected(o.id) ? "selected" : ""}" data-id="${o.id}" aria-pressed="${isSelected(o.id)}">
              <span class="opt-icon ${o.tint}">${ic(o.icon)}</span>
              <span class="opt-text"><span class="opt-label">${o.label}</span>${o.sub ? `<span class="opt-sub">${o.sub}</span>` : ""}</span>
              <span class="opt-check">${ic("check")}</span>
            </button>`).join("")}
        </div>
      </div>
      <div class="question-actions">
        <button class="back-btn" id="back">${ic("chevronLeft")} Retour</button>
        <button class="btn" id="next" ${hasSelection ? "" : "disabled"}>Continuer</button>
      </div>
    </div>`;

  const react = (pose, quip) => {
    document.getElementById("mascot-row").innerHTML = `<span class="mascot-wrap mascot-pop">${mascot(pose, 72)}</span><span class="bubble">${quip}</span>`;
  };

  document.getElementById("back").onclick = () => {
    if (currentStep === 0) { screen = "home"; } else { currentStep--; }
    render();
  };

  app.querySelectorAll(".option").forEach((btn) => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      if (q.multi) {
        let sel = state[qid] || [];
        if (sel.includes(id)) sel = sel.filter((x) => x !== id);
        else if (sel.length < q.max) sel = [...sel, id];
        else sel = [sel[1], id]; // remplace le plus ancien
        state[qid] = sel;
      } else {
        state[qid] = id;
        // Nettoie les réponses des questions devenues non pertinentes
        if (qid === "mobility" && id === "home") delete state.plug;
      }
      saveSession();
      const values = q.multi ? state[qid] : [state[qid]];
      app.querySelectorAll(".option").forEach((option) => {
        const active = values.includes(option.dataset.id);
        option.classList.toggle("selected", active);
        option.setAttribute("aria-pressed", active);
      });
      document.getElementById("next").disabled = !values.length;
      if (q.multi) {
        const initial = MASCOT_BY_QUESTION[qid];
        if (!values.length) react(initial.pose, initial.quip);
        else react("up", values.length === 1 ? "Super. Un autre usage, ou on continue ?" : "Parfait, j'ai ce qu'il me faut !");
      } else {
        const reaction = (MASCOT_REACTIONS[qid] && MASCOT_REACTIONS[qid][id]) || MASCOT_DEFAULT_REACTION;
        react(reaction.pose, reaction.quip);
      }
    };
  });

  document.getElementById("next").onclick = () => { currentStep++; saveSession(); render(); };
}

function renderComputing() {
  app.innerHTML = `
    <div class="screen computing">
      <div class="mascot-stage"><span class="float">${mascot("think", 110)}</span></div>
      <h2>Je prépare votre fiche…</h2>
    </div>`;

  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  setTimeout(() => { screen = "result"; render(); }, reduced ? 0 : 650);
}

function renderResult() {
  const p = computeProfile(state);
  const note = p.notices[0];

  // Persistance : garder le profil, nettoyer la session, refléter l'URL partageable.
  saveLast(state);
  clearSession();
  try { history.replaceState(null, "", "#r=" + encodeURIComponent(encodeState(state))); } catch (e) { /* file:// */ }

  const scanSupported = ("BarcodeDetector" in window) && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

  app.innerHTML = `
    <div class="screen" style="padding-top:12px">
      <div class="profile-banner rise" style="animation-delay:0ms">
        <span class="pb-label">${ic("spark")} Votre résultat</span>
        <h2>${p.name}</h2>
        <p>${note ? note.text : "Quatre repères simples pour bien choisir."}</p>
        <span class="pb-mascot mascot-pop">${mascot("up", 88)}</span>
      </div>

      <div class="quick-list rise" style="animation-delay:70ms">
        ${p.highlights.map((h) => `
          <div class="quick-row">
            <span class="quick-label">${h.label}</span>
            <span class="quick-value">${h.value}</span>
          </div>`).join("")}
      </div>

      <div class="result-actions">
        <button class="btn" id="share-link">${ic("share")} Partager</button>
        <button class="restart-link" id="restart">Recommencer</button>
      </div>

      <details class="drawer">
        <summary>Comprendre ce résultat <span class="drawer-toggle" aria-hidden="true">+</span></summary>
        <div class="drawer-body">
          ${p.specs.map((s) => `
            <div class="spec">
              <div class="spec-head"><span class="spec-name">${s.name}</span><span class="spec-value">${s.value}</span></div>
              <p class="spec-why">${s.why}</p>
            </div>`).join("")}
          <p class="drawer-subtitle">À vérifier avant d'acheter</p>
          <ul class="checklist">${p.checklist.map((c) => `<li><span class="cl-check">${ic("check")}</span><span>${c}</span></li>`).join("")}</ul>
          <button class="drawer-action" id="save-memo">Enregistrer la fiche</button>
        </div>
      </details>

      <details class="drawer">
        <summary>Vérifier un ordinateur <span class="drawer-toggle" aria-hidden="true">+</span></summary>
        <div class="drawer-body">
          <p class="verify-intro">Scannez ou saisissez le code-barres de la boîte.</p>
          <div class="verify-form">
            <input id="ean-input" inputmode="numeric" autocomplete="off" maxlength="14" aria-label="Code-barres EAN" placeholder="Code-barres EAN">
            <div class="verify-btns">
              ${scanSupported ? `<button class="btn secondary" id="scan-btn">${ic("camera")} Scanner</button>` : ""}
              <button class="btn" id="verify-btn">Vérifier</button>
            </div>
          </div>
          <p class="verify-hint">Exemple Icecat : <code data-example="${ICECAT_SAMPLE_EAN}">${ICECAT_SAMPLE_EAN}</code></p>
          <div id="verify-out"></div>
        </div>
      </details>
    </div>`;

  document.getElementById("restart").onclick = () => {
    state = {}; currentStep = 0;
    try { history.replaceState(null, "", location.pathname); } catch (e) { /* file:// */ }
    screen = "home"; render();
  };
  document.getElementById("share-link").onclick = () => shareProfileLink();
  document.getElementById("save-memo").onclick = () => saveMemoImage(p);

  // ----- Vérificateur -----
  const input = document.getElementById("ean-input");
  const out = document.getElementById("verify-out");
  const runVerify = () => verifyEAN(input.value, p.targets, out);
  document.getElementById("verify-btn").onclick = runVerify;
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") runVerify(); });

  app.querySelectorAll("code[data-example]").forEach((c) => {
    c.onclick = () => { input.value = c.dataset.example; runVerify(); };
  });

  const scanBtn = document.getElementById("scan-btn");
  if (scanBtn) scanBtn.onclick = () => startScan((code) => { input.value = code; runVerify(); });
}

/* Lance la vérification d'un EAN et affiche le verdict. */
async function verifyEAN(rawEAN, targets, out) {
  const ean = cleanEAN(rawEAN);
  if (!isValidGTIN(ean)) {
    out.innerHTML = `<div class="notice neutral"><strong>Code-barres invalide</strong>Vérifiez les chiffres sous les barres.</div>`;
    return;
  }
  out.innerHTML = `<p class="verify-status">Je cherche la référence…</p>`;

  const res = await fetchProductByEAN(ean);

  if (!res.found) {
    out.innerHTML = `<div class="notice neutral"><strong>${res.reason === "service" ? "Icecat est momentanément indisponible" : "Modèle non trouvé"}</strong>${res.reason === "service" ? "Réessayez dans un instant." : "Revérifiez le code-barres sur la boîte."}</div>`;
    return;
  }

  const v = compareToProfile(res.product, targets);
  const dotIcon = (st) => st === "ok" ? ic("check") : st === "low" ? ic("bolt") : ic("help");
  const cls = (st) => st === "ok" ? "v-ok" : st === "low" ? "v-low" : "v-unk";

  out.innerHTML = `
    <div class="mascot-row"><span class="mascot-wrap mascot-pop">${mascot(v.mascotPose, 64)}</span>
      <span class="bubble">${v.headline}</span></div>
    <div class="notice ${v.tone}" style="margin-top:12px">
      <strong>${v.level}</strong>
      <div class="verify-product">${res.product.brand} ${res.product.name}</div>
      <ul class="v-list">
        ${v.lines.map((l) => `
          <li class="${cls(l.status)}">
            <span class="v-dot">${dotIcon(l.status)}</span>
            <span><strong>${l.label}</strong><span class="v-txt">${l.detail}</span></span>
          </li>`).join("")}
      </ul>
      <p class="verify-caution">D'après la référence saisie (source : ${res.source}). Une même référence peut avoir des variantes régionales : vérifiez sur la boîte avant d'acheter.</p>
    </div>`;
  out.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

/* Scanner de code-barres (progressif : uniquement si BarcodeDetector existe). */
async function startScan(onFound) {
  let stream, raf, detector;
  const overlay = document.createElement("div");
  overlay.className = "scan-overlay";
  overlay.innerHTML = `
    <div class="scan-frame"><video playsinline muted></video><div class="scan-line"></div></div>
    <p class="scan-hint">Visez le code-barres de la boîte. La détection est automatique.</p>
    <button class="scan-close">Annuler</button>`;
  document.body.appendChild(overlay);
  const video = overlay.querySelector("video");

  const stop = () => {
    if (raf) cancelAnimationFrame(raf);
    if (stream) stream.getTracks().forEach((t) => t.stop());
    overlay.remove();
  };
  overlay.querySelector(".scan-close").onclick = stop;

  try {
    detector = new BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e"] });
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    stop();
    showToast("Caméra indisponible — saisissez le code à la main");
    return;
  }

  const tick = async () => {
    try {
      const codes = await detector.detect(video);
      if (codes && codes.length) {
        const code = cleanEAN(codes[0].rawValue);
        if (code.length >= 8) { stop(); onFound(code); return; }
      }
    } catch (e) { /* image pas prête, on réessaie */ }
    raf = requestAnimationFrame(tick);
  };
  raf = requestAnimationFrame(tick);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

/* ---------- Démarrage ----------
   Si l'URL porte un profil partagé (#r=…), on l'ouvre directement. */
function init() {
  const hash = location.hash || "";
  if (hash.indexOf("#r=") === 0) {
    const shared = decodeState(decodeURIComponent(hash.slice(3)));
    if (shared && isComplete(shared)) {
      state = shared;
      screen = "result";
      render();
      return;
    }
  }
  render();
}

console.assert(engineSelfCheck(), "QuelPC : le budget inférieur à 500 € doit plafonner le profil joueur");
